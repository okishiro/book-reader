name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go Engine
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Linux Graphic Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libasound2-dev

    - name: Install Fyne CLI Tools
      run: go install fyne.io/tools/cmd/fyne@latest

    - name: Pre-build Go Binary
      run: |
        # Compile your custom Go file into a standard Linux binary executable named 'main'
        go build -o main claude.go

    - name: Compile Android APK
      run: |
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle
        # Using the short flag '--id' and explicitly tracking our '--exe' binary location
        fyne package --os android --id com.myself.ereader --exe main --name EReader

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ereader-apk
        path: ./*.apk
