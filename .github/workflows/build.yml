name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Go Runtime Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true 

    - name: Install System Graphics Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libasound2-dev imagemagick

    - name: Install Fyne Compiler Utility
      run: go install fyne.io/tools/cmd/fyne@latest

    - name: Generate Application Icon
      run: |
        convert -size 512x512 xc:indigo Icon.png

    - name: Auto-Detect and Export Android NDK Path
      run: |
        # Locate whichever versioned NDK folder GitHub has pre-installed and export it to global env variables
        echo "ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)" >> $GITHUB_ENV

    - name: Compile and Package Android APK
      run: |
        # The Fyne builder now sees the valid NDK path exported automatically above
        fyne package --os android --id com.myself.ereader --name EReader --icon Icon.png

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ereader-apk
        path: ./*.apk
        retention-days: 7
