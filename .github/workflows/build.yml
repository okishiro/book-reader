name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go Engine
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Linux Graphic Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libasound2-dev

    - name: Install Fyne CLI Tools
      run: go install fyne.io/tools/cmd/fyne@latest

    - name: Create Temporary App Icon
      run: |
        # Generate a simple, valid 512x512 transparent PNG icon so Fyne can pass validation
        # If you have your own icon later, replace Icon.png in your repo
        wget -O Icon.png https://raw.githubusercontent.com/fyne-io/fyne/master/img/fyne.png

    - name: Compile Android APK
      run: |
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle
        # Let Fyne build the root package directly, passing the icon parameter explicitly
        fyne package --os android --id com.myself.ereader --name EReader --icon Icon.png

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ereader-apk
        path: ./*.apk
