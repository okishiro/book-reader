name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Go Runtime Environment
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true 

    - name: Install System Graphics Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libasound2-dev imagemagick

    - name: Install Fyne Compiler Utility
      run: go install fyne.io/tools/cmd/fyne@latest

    - name: Generate Application Icon
      run: |
        convert -size 512x512 xc:indigo Icon.png

    - name: Auto-Detect and Export Android NDK Path
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

    - name: Compile and Package Android APK
      run: |
        # Renamed to lowercase 'eread' as requested
        fyne package -v --os android --id com.myself.eread --name eread --icon Icon.png

    - name: Verify APK Generation
      run: |
        echo "=== Checking Workspace for Target Binaries ==="
        ls -la *.apk || echo "No APK found at root level!"

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: err
        path: |
          ./*.apk
          eread.apk
        if-no-files-found: error
        retention-days: 7
